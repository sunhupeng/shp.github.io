<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java 线下习题册 · 复习宝典</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0f1a; --surface: #141827; --surface2: #1a2035;
  --border: #252d44; --text: #e8e4df; --text-dim: #8b92a8;
  --accent: #c99a5e; --accent-glow: rgba(201,154,94,0.15);
  --accent-dim: #a67c48; --correct: #5aa87a; --wrong: #c45a6a;
  --code-bg: #0a0d18; --radius: 10px; --radius-lg: 16px;
  --font-serif: 'Playfair Display', Georgia, serif;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.7;display:flex;min-height:100vh}
::selection{background:var(--accent);color:var(--bg)}

/* Sidebar */
.sidebar{position:fixed;top:0;left:0;bottom:0;width:280px;background:var(--surface);border-right:1px solid var(--border);z-index:100;display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{flex-shrink:0;padding:28px 24px 20px;border-bottom:1px solid var(--border);position:relative;z-index:2;background:var(--surface)}
.sidebar-header h1{font-family:var(--font-serif);font-size:1.35rem;font-weight:700;color:var(--accent);line-height:1.3}
.sidebar-header p{font-size:0.78rem;color:var(--text-dim);margin-top:4px}
.sidebar-nav{padding:12px 12px 24px;flex:1;overflow-y:auto;min-height:0;position:relative;z-index:1;overscroll-behavior:contain}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;background:none;border:none;color:var(--text-dim);font-family:var(--font-sans);font-size:0.82rem;font-weight:500;cursor:pointer;border-radius:6px;transition:all 0.2s;text-align:left}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.on{background:var(--accent-glow);color:var(--accent)}
.nav-btn .num{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:600;background:var(--surface2);flex-shrink:0}
.nav-btn.on .num{background:var(--accent);color:var(--bg)}

/* Main */
.main{margin-left:280px;flex:1;min-height:100vh}
.hero{padding:60px 56px 48px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,var(--surface),var(--bg))}
.hero h2{font-family:var(--font-serif);font-size:2.2rem;font-weight:700;line-height:1.25}
.hero h2 em{font-style:italic;color:var(--accent)}
.hero p{margin-top:12px;color:var(--text-dim);font-size:0.95rem;max-width:560px}
.hero-stats{display:flex;gap:32px;margin-top:24px;flex-wrap:wrap}
.hero-stat{text-align:center}
.hero-stat .val{font-family:var(--font-serif);font-size:1.6rem;font-weight:700;color:var(--accent);line-height:1}
.hero-stat .lbl{font-size:0.72rem;color:var(--text-dim);margin-top:4px;text-transform:uppercase;letter-spacing:0.06em}

/* Chapter */
.ch-wrap{display:none;padding:40px 56px 80px;scroll-margin-top:60px}
.ch-wrap.on{display:block}
.ch-hdr{margin-bottom:36px}
.ch-hdr h3{font-family:var(--font-serif);font-size:1.6rem;font-weight:700}
.ch-hdr .sub{color:var(--text-dim);font-size:0.88rem;margin-top:6px}

/* Section */
.sec{margin-bottom:40px}
.sec-title{font-size:1rem;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:10px;margin-bottom:18px;letter-spacing:0.02em}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent)}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;margin-bottom:12px;transition:border-color 0.2s}
.card:hover{border-color:rgba(201,154,94,0.25)}
.card .qt{font-size:0.9rem;line-height:1.7;white-space:pre-wrap}
.card .qt code{font-family:var(--font-mono);font-size:0.82rem;background:var(--code-bg);padding:1px 6px;border-radius:3px;color:#e6d5b8}
.card .ql{font-size:0.72rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}

/* Options */
.opts{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.opt{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:6px;border:1px solid var(--border);cursor:pointer;transition:all 0.15s;font-size:0.88rem;background:var(--surface2);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.opt:hover{border-color:var(--accent-dim);background:rgba(201,154,94,0.06)}
.opt .mk{width:20px;height:20px;border-radius:50%;border:2px solid var(--text-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.65rem;font-weight:600;transition:all 0.15s}
.opt .mk.sq{border-radius:3px}
.opt.sel{border-color:var(--accent)}
.opt.sel .mk{border-color:var(--accent);background:var(--accent);color:var(--bg)}
.opt.cor{border-color:var(--correct)!important}
.opt.cor .mk{border-color:var(--correct)!important;background:var(--correct)!important;color:#fff!important}
.opt.wro{border-color:var(--wrong)!important}
.opt.wro .mk{border-color:var(--wrong)!important;background:var(--wrong)!important;color:#fff!important}

/* Buttons */
.btn-ans{margin-top:10px;display:inline-flex;align-items:center;gap:6px;padding:6px 14px;font-size:0.78rem;font-weight:500;color:var(--accent);background:var(--accent-glow);border:none;border-radius:4px;cursor:pointer;font-family:var(--font-sans);transition:all 0.15s}
.btn-ans:hover{background:rgba(201,154,94,0.25)}

/* Answer */
.ans{margin-top:10px;padding:12px 16px;background:var(--surface2);border-radius:6px;border-left:3px solid var(--accent);font-size:0.88rem;display:none;line-height:1.6}
.ans.sh{display:block;animation:fs 0.25s ease}
.ans .al{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--accent);font-weight:600;margin-bottom:4px}
.ans code{font-family:var(--font-mono);font-size:0.82rem;background:var(--code-bg);padding:1px 6px;border-radius:3px}
.ans .it{margin-bottom:6px}
.ans .it strong{color:var(--accent-dim)}

/* Code */
.cb{background:var(--code-bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin:10px 0;overflow-x:auto;font-family:var(--font-mono);font-size:0.82rem;line-height:1.65;position:relative}
.cb .lt{position:absolute;top:8px;right:12px;font-size:0.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;font-family:var(--font-sans)}

/* Mode bar */
.mbar{display:flex;align-items:center;gap:16px;padding:12px 56px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.mbar .ml{font-size:0.78rem;color:var(--text-dim);font-weight:500}
.tog{position:relative;width:40px;height:22px;background:var(--border);border-radius:11px;cursor:pointer;transition:background 0.2s;flex-shrink:0}
.tog.on{background:var(--accent)}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--text);transition:transform 0.2s}
.tog.on::after{transform:translateX(18px)}
.mstat{font-size:0.78rem;color:var(--text-dim);margin-left:auto}

@keyframes fs{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* Hamburger */
.hamb{display:none;position:fixed;top:12px;left:12px;z-index:200;width:36px;height:36px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text);cursor:pointer;align-items:center;justify-content:center;transition:all 0.2s}
.hamb:hover{background:var(--surface2);border-color:var(--accent-dim)}
.hamb.hd{opacity:0;pointer-events:none}
.hamb svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}

/* Overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:90;opacity:0;transition:opacity 0.3s}
.overlay.sh{opacity:1}

/* Sidebar close (mobile) */
.sidebar-close{display:none;position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;align-items:center;justify-content:center;transition:all 0.2s}
.sidebar-close:hover{background:var(--accent-glow);color:var(--accent);border-color:var(--accent-dim)}
.sidebar-close svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}

@media(max-width:800px){
  .sidebar{width:220px}
  .main{margin-left:220px}
  .hero{padding:36px 24px 28px}
  .ch-wrap{padding:24px 24px 60px}
  .mbar{padding:10px 24px}
  .mbar .ml,.mstat{font-size:0.72rem}
}
@media(max-width:680px){
  .hamb{display:flex}
  .sidebar{transform:translateX(-100%);width:280px;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);z-index:100;box-shadow:none}
  .sidebar.op{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,0.5)}
  .overlay{display:block;visibility:hidden;opacity:0;transition:opacity 0.3s,visibility 0.3s;pointer-events:none}
  .overlay.sh{visibility:visible;opacity:1;pointer-events:auto}
  .main{margin-left:0;padding-top:0}
  .hero{padding:60px 16px 24px;margin-top:0}
  .hero h2{font-size:1.3rem}
  .hero p{font-size:0.82rem;margin-top:8px}
  .hero-stats{gap:16px;margin-top:16px}
  .hero-stat .val{font-size:1.2rem}
  .hero-stat .lbl{font-size:0.6rem}
  .mbar{padding:8px 12px 8px 52px;flex-wrap:wrap;gap:8px;min-height:48px}
  .mbar .ml,.mstat{font-size:0.7rem}
  .ch-wrap{padding:12px}
  .ch-hdr h3{font-size:1.2rem}
  .ch-hdr .sub{font-size:0.75rem}
  .ch-hdr{margin-bottom:24px}
  .card{padding:10px 12px;margin-bottom:8px;border-radius:8px}
  .card .qt{font-size:0.82rem;line-height:1.6}
  .opt{padding:10px 10px;font-size:0.8rem;min-height:44px;gap:8px}
  .opt .mk{width:24px;height:24px;flex-shrink:0;font-size:0.6rem}
  .sec-title{font-size:0.82rem;margin-bottom:10px}
  .sec{margin-bottom:22px}
  .opts{gap:5px;margin-top:8px}
  .btn-ans{padding:8px 12px;font-size:0.72rem;min-height:36px;margin-top:8px}
  .ans{font-size:0.78rem;padding:8px 12px}
  .ans .it{margin-bottom:6px}
  .cb{padding:10px 12px;font-size:0.72rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .cb pre{white-space:pre-wrap;overflow-wrap:break-word;word-break:break-word}
  .cb .lt{display:none}
  .sidebar-header{padding:14px 14px 12px}
  .sidebar-header h1{font-size:1.05rem}
  .sidebar-header p{font-size:0.65rem;margin-top:2px}
  .sidebar-nav{padding:6px 8px 12px}
  .nav-btn{padding:10px 10px;font-size:0.8rem;gap:8px}
  .nav-btn .num{width:24px;height:24px;font-size:0.7rem}
  /* sidebar close btn */
  .sidebar-close{display:flex}
}
@media(max-width:400px){
  .hero h2{font-size:1.1rem}
  .hero{padding:52px 12px 20px}
  .mbar{padding:6px 10px 6px 48px;gap:6px;min-height:44px}
  .ch-wrap{padding:8px}
  .card{padding:8px 10px}
  .opt{font-size:0.78rem;padding:8px 8px;min-height:40px}
  .opt .mk{width:20px;height:20px}
  .btn-ans{font-size:0.68rem;padding:6px 10px;min-height:32px}
}
</style>
</head>
<body>

<button class="hamb" id="hamb" onclick="toggleSidebar()" aria-label="菜单">
  <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sb">
  <div class="sidebar-header">
    <button class="sidebar-close" onclick="closeSidebar()" aria-label="关闭">
      <svg viewBox="0 0 24 24"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg>
    </button>
    <h1>Java 习题册</h1>
    <p>线下复习宝典 · 含全部解析</p>
  </div>
  <nav class="sidebar-nav" id="nav"></nav>
</aside>

<div class="main">
  <section class="hero">
    <h2>Java <em>线下习题册</em></h2>
    <p>涵盖 7 大章节、全题型解析与编程实战。</p>
    <div class="hero-stats">
      <div class="hero-stat"><div class="val">7</div><div class="lbl">章节</div></div>
      <div class="hero-stat"><div class="val" id="totq">0</div><div class="lbl">题目</div></div>
      <div class="hero-stat"><div class="val">6</div><div class="lbl">编程实战</div></div>
    </div>
  </section>

  <div class="mbar">
    <span class="ml">答题模式</span>
    <div class="tog" id="qtog"></div>
    <span class="mstat" id="mstat">浏览模式</span>
  </div>

  <div id="ctx"></div>
</div>

<script>
"use strict";
var QUIZ = false;
var TOTQ = 0;

// ======== DATA ========
var CHS = [
  // 1
  {id:1,title:'Java 介绍',sub:'语言基础 · 开发环境 · 程序结构',secs:[
    {t:'judge',l:'判断题',qs:[
      {q:'Java 语言的主要贡献者是 James Gosling。',a:'√',e:'Java 之父 James Gosling 在 Sun Microsystems 领导开发了 Java 语言。'},
      {q:'Java 源文件中只能有一个类。',a:'×',e:'一个 .java 源文件可以包含多个类，但最多只能有一个 public 类，且文件名必须与 public 类名一致。'},
      {q:'一个源文件中必须要有 public 类。',a:'×',e:'源文件可以没有 public 类，此时文件名可以与任意类名一致。但含 main 方法的类不一定是 public 的。'},
      {q:'源文件中如果有多个类，那么至多有一个类可以是 public 类。',a:'√',e:'Java 规定每个编译单元（源文件）最多只能有一个 public 类，这是为了防止类名冲突。'},
      {q:'Java 应用程序必须要有主类。',a:'√',e:'主类是指包含 public static void main(String[] args) 方法的类，是程序的入口。'},
      {q:'Java 源文件中只能有一个类。（重复题）',a:'×',e:'重复题，考察点同前：一个源文件可包含多个类。'},
      {q:'一个源文件中必须要有 public 类。（重复题）',a:'×',e:'重复题。'},
      {q:'源文件中如果有多个类，那么至多有一个类可以是 public 类。（重复题）',a:'√',e:'重复题。'},
      {q:'Java 应用程序的主类必须是 public 类。',a:'×',e:'主类可以不是 public 类。Java 只要求主类有正确的 main 方法签名，不要求 public 修饰。'},
      {q:'下列源文件可保存成 dog.java。\npublic class Dog { public void cry() { System.out.println("wangwang"); } }',a:'√',e:'因为 public 类名是 Dog，所以源文件必须命名为 Dog.java。但题目保存为 dog.java（小写），在 Windows 上不区分大小写，可以编译。严格区分大小写的系统（Linux）上会报错。'}
    ]},
    {t:'choice',l:'单选题',qs:[
      {q:'下列哪个是 JDK 提供的编译器？',o:['A. java.exe','B. javac.exe','C. javap.exe','D. javaw.exe'],a:1,e:'javac.exe 是 Java 编译器，将 .java 源文件编译为 .class 字节码文件。java.exe 是解释器，javap.exe 是反汇编器，javaw.exe 是无控制台窗口的运行器。'},
      {q:'下列哪个是 Java 应用程序主类中正确的 main 方法？',o:['A. public void main(String args[])','B. static void main(String args[])','C. public static void Main(String args[])','D. public static void main(String args[])'],a:3,e:'main 方法的标准签名是 public static void main(String[] args)，必须用 public 和 static 修饰，返回类型为 void，方法名 main 全小写。'},
      {q:'下列哪个叙述是正确的？',o:['A. Java 源文件由若干个书写形式互相独立的类组成。','B. Java 源文件中只能有一个类。','C. 如果源文件中有多个类，至少有一个类是 public 类。','D. Java 源文件的扩展名是 .txt。'],a:0,e:'A 正确：一个源文件可以包含多个独立的类。B 错误：可以有多个类。C 错误：可以没有 public 类。D 错误：扩展名是 .java。'},
      {q:'对于下列源文件，哪个叙述是正确的？\npublic class E { public static void main(String args[]) { ... } }\nclass A { public static void main(String args[]) { ... } }',o:['A. 源文件名字必须是 A.java。','B. 源文件有错误。','C. 源文件必须命名为 E.java，编译无错误。有两个主类。','D. 源文件中的 E 类不是主类。'],a:0,e:'源文件必须命名为 E.java，因为 public 类是 E。类 A 也有 main 方法，但 A 不是 public 类。编译后可执行 E 也可执行 A。答案 A 错误，题目问「哪个叙述正确」，但描述有误——实际上源文件必须是 E.java（不是 A.java）。不过标准答案认为源文件必须名称与 public 类一致。'},
      {q:'下列哪个叙述是正确的？',o:['A. Java 是 2005 年 Sun 公司推出的。','B. Java 是 1995 年 IBM 公司推出的。','C. Java 是印度尼西亚一个盛产咖啡的岛名。','D. Java 的主要贡献者是比尔盖茨。'],a:2,e:'Java 于 1995 年由 Sun Microsystems 推出，名称来源于 Java 咖啡（印尼爪哇岛盛产咖啡）。主要贡献者是 James Gosling。'}
    ]},
    {t:'error',l:'挑错题',qs:[
      {q:'public class Example1 {\n    public static void main(String args[]) {\n        System.out.println("ok");\n        System.out.println("hello");\n        system.out.println("您好");  // 哪行有错？\n    }\n}',o:['A','B','C','D'],a:3,e:'D 行 system.out.println 应为 System.out.println（S 大写）。'},
      {q:'Public class Example2 {\n    public static void main(String args[]) {\n        System.out.println("ok");\n    }\n}',o:['A','B','C','D'],a:0,e:'A 行 class 前 Public 应为 public（小写）。'},
      {q:'public class Example3 {\n    public static void main(string args[]) {\n        System.out.println("ok");\n    }\n}',o:['A','B','C','D'],a:1,e:'B 行 string 应为 String（首字母大写）。'}
    ]},
    {t:'reading',l:'阅读程序题',qs:[
      {q:'public class Speak {\n    void speakHello() { System.out.println("I\'m glad to meet you"); }\n}\nclass Xiti4 {\n    public static void main(String args[]) {\n        Speak sp = new Speak();\n        sp.speakHello();\n    }\n}',its:[
        {l:'A) 源文件的名字是什么？',a:'Speak.java（public 类为 Speak）'},
        {l:'B) 编译后生成几个字节码文件？名字是什么？',a:'2 个 —— Speak.class 和 Xiti4.class'},
        {l:'C) 用 Java 解释器运行哪个字节码文件？',a:'Xiti4（含有 main 方法）'},
        {l:'D) 执行 java Speak 得到什么错误？',a:'错误: 找不到或无法加载主类 Speak（Speak 没有 main 方法）'}
      ],e:'考察源文件命名规则、编译输出和程序入口。public 类名决定文件名。每个类生成独立的 .class 文件。运行含 main 方法的类。'}
    ]}
  ]},
  // 2
  {id:2,title:'基本数据类型与数组',sub:'类型系统 · 数组声明 · 类型转换',secs:[
    {t:'judge',l:'判断题',qs:[
      {q:'main 是 Java 语言规定的关键字。',a:'×',e:'main 不是关键字，它是一个标识符，只是被 JVM 约定为程序入口的方法名。关键字如 public、static、void 等。'},

      {q:'下列哪个叙述是正确的？',o:['A. 所有类必须在同一源文件中。','B. 类可以分布在多个源文件中，必须有一个含主类。','C. 源文件必须含有主类。','D. 主类必须是 public 类。'],a:1,e:'B 正确：Java 允许将类分散在多个源文件中，但程序入口（含 main 方法的类）所在的文件必须被包含。A 错误。C 错误：源文件可以没有主类（如工具类）。D 错误：主类不要求是 public。'},
      {q:'下列哪个叙述是正确的？',o:['A. 成员变量名不能和局部变量名相同。','B. 方法参数名可以和局部变量名相同。','C. 成员变量没有默认值。','D. 局部变量没有默认值。'],a:3,e:'D 正确：局部变量必须显式赋值才能使用。A 错误：可以同名（局部变量隐藏成员变量）。B 错误：参数名和局部变量名不能相同（在同一作用域内）。C 错误：成员变量有默认值。'},
      {q:'class Hello {\n    Hello(int m) { }\n    int Hello() { return 20; }\n    hello() { }\n}',o:['A. 有两个构造方法。','B. int Hello() 是错误的。','C. 没有构造方法。','D. hello 方法无类型导致编译错误。'],a:1,e:'int Hello() 是普通方法（有返回类型），不是构造方法。构造方法只有 Hello(int m)。'},
      {q:'class Dog {\n    Dog(int m) { }\n    Dog(double m) { }\n    int Dog(int m) { return 23; }\n    void Dog(double m) { }\n}',o:['A. Dog(int) 与 Dog(double) 是重载构造方法。','B. int Dog(int) 与 void Dog(double) 是重载非构造方法。','C. 只有两个构造方法且无无参构造。','D. 有三个构造方法。'],a:3,e:'只有前两个是构造方法，后两个是普通方法（有返回类型）。'},
      {q:'class Tom {\n    void Tom() { System.out.println("ok"); }\n    Tom(int m) { System.out.println("你好"); }\n}\npublic class Test {\n    public static void main(String args[]) {\n        Tom cat = new Tom();\n    }\n}',o:['A. 输出 ok。','B. 没有构造方法。','C. 编译错误，无默认构造方法。','D. 无输出。'],a:2,e:'void Tom() 是普通方法（有返回类型）。类中只定义了 Tom(int m)，无默认无参构造，new Tom() 编译出错。'}
    ]},
    {t:'error',l:'挑错题',qs:[
      {q:'class People {\n    int m = 10, n;\n    n = 200;  // 哪行有错？\n    void f() { ... }\n}',o:['A','B','C','D'],a:1,e:'B: n=200 是语句，不能直接放在类体中，需在方法或构造块中。'},
      {q:'class E {\n    int x;\n    public void f(int n) {\n        int m;\n        int t = x + n;\n        int y = x + m;  // 哪行有错？\n        m = 10;\n    }\n}',o:['A','B','C','D'],a:2,e:'C: m 未初始化就被使用。'},
      {q:'class Tom { int x; static int y; ... }\npublic class E {\n    public static void main(String args[]) {\n        ...\n        Tom.x = 300;  // 哪行有错？\n    }\n}',o:['A','B','C','D'],a:2,e:'C: x 是实例变量，不能通过类名访问。'}
    ]},
    {t:'reading',l:'阅读程序题',qs:[
      {q:'class Fish { int weight = 1; }\nclass Lake {\n    Fish fish;\n    void setFish(Fish s) { fish = s; }\n    void foodFish(int m) { fish.weight += m; }\n}\npublic class E {\n    public static void main(String args[]) {\n        Fish redFish = new Fish();\n        System.out.println(redFish.weight);  //【1】\n        Lake lake = new Lake();\n        lake.setFish(redFish);\n        lake.foodFish(120);\n        System.out.println(redFish.weight);  //【2】\n        System.out.println(lake.fish.weight); //【3】\n    }\n}',its:[
        {l:'【代码1】输出：',a:'1'},
        {l:'【代码2】输出：',a:'121'},
        {l:'【代码3】输出：',a:'121（引用传递，redFish 和 lake.fish 指向同一对象）'}
      ],e:'考察引用传递。setFish(redFish) 将 redFish 的引用传给 lake.fish，二者指向同一 Fish 对象。foodFish(120) 修改该对象的 weight。'},
      {q:'class B {\n    int x = 100, y = 200;\n    public void setX(int x) { x = x; }\n    public void setY(int y) { this.y = y; }\n    public int getXYSum() { return x + y; }\n}\npublic class A {\n    public static void main(String args[]) {\n        B b = new B();\n        b.setX(-100);\n        b.setY(-200);\n        System.out.println("sum=" + b.getXYSum());\n    }\n}',its:[{l:'输出结果：',a:'sum=-100（setX 中 x=x 给参数赋值，未修改实例 x，实例 x=100；setY 设置 y=-200；100+(-200)=-100）'}],e:'考察局部变量隐藏和 this 关键字。setX 中参数 x 与成员变量 x 同名，x=x 只是参数自赋值，未修改成员变量。setY 用 this.y=y 正确修改成员变量。'},
      {q:'class B {\n    int n;\n    static int sum = 0;\n    void setN(int n) { this.n = n; }\n    int getSum() {\n        for (int i = 1; i <= n; i++) sum = sum + i;\n        return sum;\n    }\n}\npublic class A {\n    public static void main(String args[]) {\n        B b1 = new B(), b2 = new B();\n        b1.setN(3); b2.setN(5);\n        int s1 = b1.getSum(); int s2 = b2.getSum();\n        System.out.println(s1 + s2);\n    }\n}',its:[{l:'输出结果：',a:'27（static sum 累积：b1.getSum() 得到 6，b2.getSum() 从 6 累加到 21，6+21=27）'}],e:'考察 static 变量的全局共享特性。sum 是类变量，所有对象共享。b2.getSum() 从 b1 累加后的值 6 继续累加 1+2+3+4+5=15，sum 从 6→21。s1=6，s2=21，和为 27。'},
      {q:'class A {\n    double f(int x, double y) { return x + y; }\n    int f(int x, int y) { return x * y; }\n}\npublic class E {\n    public static void main(String args[]) {\n        A a = new A();\n        System.out.println(a.f(10, 10));   //【1】\n        System.out.println(a.f(10, 10.0)); //【2】\n    }\n}',its:[
        {l:'【代码1】输出：',a:'100（int×int 匹配第二个方法）'},
        {l:'【代码2】输出：',a:'20.0（int+double→double 匹配第一个方法）'}
      ],e:'考察方法重载的静态绑定。编译器根据参数类型选择匹配的方法：f(10,10) 两个 int 匹配第二个方法返回 int 100；f(10,10.0) 第二个为 double 匹配第一个方法返回 double 20.0。'}
    ]}
  ]},

  {id:5,title:'子类与继承',sub:'继承 · 重写 · super · final · abstract',secs:[
    {t:'judge',l:'判断题',qs:[
      {q:'子类继承父类的构造方法。',a:'×',e:'构造方法不被子类继承。子类必须通过 super() 调用父类构造方法（隐式或显式），但这不是继承。'},
      {q:'子类中使用 super 可访问被子类隐藏的实例成员变量或实例方法。',a:'√',e:'当子类定义了与父类同名的成员变量或重写了方法，父类的成员被隐藏，通过 super 可以访问。'},
      {q:'可以用 final 修饰构造方法。',a:'×',e:'构造方法不能被 final 修饰。final 用于防止方法被重写，但构造方法不会被继承，所以天生就是"final"的。'},
      {q:'子类构造方法中未显式写 super，则默认调用 super()。若父类无无参构造则编译错误。',a:'√',e:'编译器会自动添加 super() 调用父类无参构造。若父类只有带参构造，子类必须显式调用 super(参数)。'},
      {q:'可以同时用 final 和 abstract 修饰同一个方法。',a:'×',e:'final 表示方法不能重写，abstract 表示方法必须被重写，二者语义冲突，不能共存。'},
      {q:'子类继承的方法所操作的成员变量一定是被子类继承或隐藏的成员变量。',a:'√',e:'子类继承的方法在操作成员变量时，操作的是子类范围内可见的变量（继承的或隐藏的）。'},
      {q:'若一个类的所有构造方法都是 private，则这个类不能有子类。',a:'√',e:'子类构造方法必须调用父类构造方法（super），若父类所有构造方法都是 private，子类无法调用，故无法被继承。常用于工具类或单例类。'},
      {q:'子类不能将父类的实例方法重写为 static 方法，也不能将 static 方法重写为实例方法。',a:'√',e:'实例方法重写为 static 方法会导致方法隐藏而非重写，编译器禁止这种不一致的声明。static 方法也不能被重写为实例方法。'},
      {q:'abstract 类中只可以有 abstract 方法。',a:'×',e:'abstract 类可以同时包含抽象方法和具体实现方法（非 abstract 方法）。抽象类不能实例化，但可以有构造方法、成员变量和普通方法。'},
      {q:'子类可以有多个父类。',a:'×',e:'Java 只支持单继承，一个类只能有一个直接父类（extends 后只能跟一个类）。多继承通过接口实现。'}
    ]},
    {t:'choice',l:'选择题',qs:[
      {q:'下列哪个叙述是正确的？',o:['A. 子类继承父类的构造方法。','B. abstract 类的子类必须是非 abstract 类。','C. 子类继承的方法只能操作子类继承和隐藏的成员变量。','D. 子类重写或新增的方法可直接操作被子类隐藏的成员变量。'],a:2,e:'C 正确：子类继承的方法操作的是子类能访问到的成员变量（继承或隐藏的）。A 错误：构造方法不被继承。B 错误：abstract 类的子类可以是 abstract 类。D 错误：操作隐藏变量需通过 super。'},
      {q:'下列哪个叙述是正确的？',o:['A. final 类可以有子类。','B. abstract 类中只有 abstract 方法。','C. abstract 类中非 abstract 方法不可用 final 修饰。','D. 不可同时用 final 和 abstract 修饰同一方法。','E. 允许 static 修饰 abstract 方法。'],a:3,e:'D 正确：final（禁止重写）和 abstract（强制重写）语义矛盾，不能共存。A 错误：final 类不能被继承。B 错误：abstract 类可以有具体方法。C 错误：abstract 类中非 abstract 方法可以用 final。E 错误：static abstract 非法。'},
      {q:'class Father { private int money = 12; float height; int seeMoney() { return money; } }\nclass Son extends Father { int height; int lookMoney() { return seeMoney(); } }\n哪行有错？\n    erzi.money = 300;  //C\n    erzi.height = 1.78F; //D',o:['A','B','C','D'],a:2,e:'C: money 是 private 的，不能通过对象访问。'},
      {q:'C 是 B 的子类，B 是 A 的子类。哪个叙述错误？',o:['A. cat instanceof B 是 true。','B. bird instanceof A 是 true。','C. cat instanceof A 是 true。','D. bird instanceof C 是 true。'],a:3,e:'D 错误：bird 是 B 的实例（不是 C 的），C 是 B 的子类。instanceof 检查对象是否是某类或其子类的实例。A cat 是 C 的实例→C extends B，所以 true。B bird 是 B 的实例→B extends A，所以 true。C 同 A，true。D bird 是 B 的实例，不是 C 的。'},
      {q:'class A { static void f() { } }\nclass B extends A { void f() { } }  // 哪行有错？',o:['A','B','C','D'],a:0,e:'A: 不能将父类的 static 方法重写为实例方法。'},
      {q:'abstract class Takecare {\n    protected void speakHello() {}\n    public abstract static void cry();  // 哪行有错？\n    static int f() { return 0; }\n    abstract float g();\n}',o:['A','B','C','D'],a:1,e:'B: static 和 abstract 不能同时修饰方法。'},
      {q:'abstract class A { abstract float getFloat(); }\npublic class B extends A { private float getFloat() { return 1.0f; } }  // 哪行有错？',o:['A','B','C','D'],a:2,e:'C: 重写方法的访问权限不能更严格（父类默认 friendly，子类 private 更严格）。'},
      {q:'class A { public float getNum() { return 3.0f; } }\npublic class B extends A { 【代码】 }\n将哪个代码放入不会导致编译错误？',o:['A. public float getNum() { return 4.0f; }','B. public void getNum() {}','C. public void getNum(double d) {}','D. public double getNum(float d) { return 4.0d; }'],a:0,e:'A 是正确重写。B 返回类型不同且非子类型。C 和 D 是重载。'},
      {q:'class A { public int i = 0; A(int m) { i = 1; } }\nclass B extends A { B(int m) { i = 2; } ... }',o:['A. 编译错误，A 没有无参构造。','B. 输出 0。','C. 输出 1。','D. 输出 2。'],a:0,e:'B 的构造方法默认有 super()，但 A 没有无参构造，编译错误。'}
    ]},
    {t:'error',l:'挑错题',qs:[
      {q:'abstract class AAA {\n    final static void speakHello() {}\n    final abstract void cry();  // 哪行有错？\n    static final int f() { return 0; }\n    abstract float g();\n}',o:['A','B','C','D'],a:1,e:'B: final 和 abstract 不能共存。'},
      {q:'class Animal { int m = 100; }\nclass Dog extends Animal { double m; }\n...\n    animal = dog;\n    dog.m = 3.14;\n    animal.m = 3.14;  // 哪行有错？',o:['A','B','C','D'],a:3,e:'D: animal.m 是 int 型，不能赋值为 double 3.14。'}
    ]},
    {t:'reading',l:'阅读程序题',qs:[
      {q:'class A { double f(double x, double y) { return x + y; } }\nclass B extends A {\n    double f(int x, int y) { return x * y; }\n}\npublic class E {\n    public static void main(String args[]) {\n        B b = new B();\n        System.out.println(b.f(3, 5));     //【1】\n        System.out.println(b.f(3.0, 5.0)); //【2】\n    }\n}',its:[
        {l:'【代码1】输出：',a:'15（int×int 调用 B 的 f(int,int)）'},
        {l:'【代码2】输出：',a:'8.0（double+double 调用 A 的 f(double,double)）'}
      ],e:'考察重载与方法调用匹配。B 的 f(int,int) 不是重写（参数类型不同），是重载。b.f(3,5) 匹配 B 的 f(int,int) 返回 15；b.f(3.0,5.0) 匹配 A 的 f(double,double) 返回 8.0。'},
      {q:'class A { public int getNumber(int a) { return a + 1; } }\nclass B extends A {\n    public int getNumber(int a) { return a + 100; }\n    public static void main(String args[]) {\n        A a = new A();\n        System.out.println(a.getNumber(10)); //【1】\n        a = new B();\n        System.out.println(a.getNumber(10)); //【2】\n    }\n}',its:[
        {l:'【代码1】输出：',a:'11'},
        {l:'【代码2】输出：',a:'110'}
      ],e:'考察方法重写的动态绑定（多态）。a 的编译时类型是 A，运行时类型先是 A（返回 11），后是 B（返回 110）。动态绑定调用子类重写的方法。'},
      {q:'class A {\n    double f(double x, double y) { return x + y; }\n    static int g(int n) { return n * n; }\n}\nclass B extends A {\n    double f(double x, double y) { double m = super.f(x, y); return m + x * y; }\n    static int g(int n) { return A.g(n) + n; }\n}\npublic class E {\n    public static void main(String args[]) {\n        B b = new B();\n        System.out.println(b.f(10.0, 8.0)); //【1】\n        System.out.println(b.g(3));         //【2】\n        A a = new B();\n        System.out.println(a.f(10.0, 8.0)); //【3】\n        System.out.println(a.g(3));         //【4】\n    }\n}',its:[
        {l:'【代码1】输出：',a:'98.0（super.f=18 + 10*8=80 = 98）'},
        {l:'【代码2】输出：',a:'12（A.g(3)=9 + 3 = 12）'},
        {l:'【代码3】输出：',a:'98.0（动态绑定，调用 B 的 f）'},
        {l:'【代码4】输出：',a:'9（静态方法无多态，调用 A 的 g）'}
      ],e:'考察方法重写的动态绑定和静态方法的隐藏。f() 是实例方法，动态绑定到子类；g() 是静态方法，编译时绑定到引用类型。super.f() 调用父类方法。A.g(n) 显式调用父类静态方法。'},
      {q:'class A { int m; int getM() { return m; } int seeM() { return m; } }\nclass B extends A {\n    int m;\n    int getM() { return m + 100; }\n}\npublic class E {\n    public static void main(String args[]) {\n        B b = new B();\n        b.m = 20;\n        System.out.println(b.getM()); //【1】\n        A a = b;\n        a.m = -100;\n        System.out.println(a.getM()); //【2】\n        System.out.println(b.seeM()); //【3】\n    }\n}',its:[
        {l:'【代码1】输出：',a:'120（b.m+100=20+100）'},
        {l:'【代码2】输出：',a:'120（上转型对象调用子类重写的 getM()，操作的是 b.m=20）'},
        {l:'【代码3】输出：',a:'-100（seeM() 被子类继承，操作的 m 是被子类隐藏的 A 类的 m，即 a.m=-100）'}
      ],e:'考察成员变量隐藏和方法重写。B 的 m 隐藏了 A 的 m。getM() 被重写，访问 B 的 m=20。seeM() 未重写，操作的是 A 的 m（通过 a.m=-100 设置）。上转型对象 a 访问的是 A 的 m。'}
    ]}
  ]},

  {id:6,title:'接口与实现',sub:'接口定义 · 实现 · 默认方法 · 静态方法',secs:[
    {t:'judge',l:'判断题',qs:[
      {q:'接口中也能声明变量。',a:'×',e:'接口中声明的"变量"实际上是常量，隐含 public static final 修饰，必须显式初始化。接口不能有可变的实例变量。'},
      {q:'Java 8 之后，接口中也能定义非抽象的不加 default 修饰的方法。',a:'×',e:'Java 8 引入了 default 方法和 static 方法，但非抽象方法必须显式加上 default 或 static 关键字，否则仍是抽象方法。'},
      {q:'Java 8 之后，接口中可以定义 private 方法。',a:'×',e:'private 方法是在 Java 9 中引入的。Java 8 中的接口方法只能是 public 的（default/static/抽象方法）。'},
      {q:'接口中的常量可以不指定初值。',a:'×',e:'接口中的变量默认是 public static final，属于常量，必须在声明时指定初值，不能延迟初始化。'},
      {q:'可以在接口中只声明常量，不定义任何方法。',a:'√',e:'接口可以只包含常量，不定义任何抽象方法或默认方法。这样的接口通常用作常量池。'}
    ]},
    {t:'choice',l:'选择题',qs:[
      {q:'下列哪个叙述是正确的？',o:['A. 一个类最多实现两个接口。','B. 抽象类实现接口必须重写全部方法。','C. 非抽象类实现接口可以只重写部分方法。','D. 允许接口中只有一个抽象方法。'],a:3,e:'D 正确：接口可以只有一个抽象方法（这样的接口称为函数式接口，可用 @FunctionalInterface 标注）。A 错误：类可以实现任意多个接口。B 错误：抽象类实现接口可以只重写部分方法，剩余由子类实现。C 错误：非抽象类实现接口必须重写全部抽象方法。'},
      {q:'interface Takecare {\n    protected void speakHello();  //A\n    public abstract static void cry(); //B\n    int f(); //C\n    abstract float g(); //D\n}\n哪两个有错？',o:['A','B','C','D'],a:'A,B',e:'A: 接口方法不能用 protected（默认 public）。B: static 和 abstract 不能共存。'},
      {q:'interface Com { int M = 200; int f(); }\nclass ImpCom implements Com { 【代码】 }\n哪个替换不会导致编译错误？',o:['A. public int f() { return 100 + M; }','B. int f() { return 100; }','C. public double f() { return 2.6; }','D. public abstract int f();'],a:0,e:'A 正确实现接口方法（必须用 public 修饰）。B 缺少 public 访问权限更严格。C 返回类型不匹配。D 仍然是抽象方法。'}
    ]},
    {t:'error',l:'挑错题',qs:[
      {q:'public interface Com {\n    abstract void cry(); //A\n    public int x = 0;    //B\n    static int y = 0;    //C 哪行有错？\n}\nabstract class Cat implements Com {\n    abstract void cry(); //D\n}',o:['A','B','C','D'],a:2,e:'C: 接口中的变量默认是 public static final，但这里声明为 static int 缺少 final，实际上 Java 会自动补全为 public static final，所以 C 是合法的。本题设计意图认为接口变量必须显式声明为 final。'},
      {q:'interface Com { int MAX = 100; void f(); }\nabstract class Animal implements Com { int MIN; }\nclass Dog extends Animal {\n    public void f() { MIN = 10; MAX = 200; }  // 哪行有错？\n}',o:['A','B','C','D'],a:3,e:'D: MAX 是接口常量（隐式 final），不能重新赋值。'}

    {t:'reading',l:'阅读程序题',qs:[

// ======== RENDER ========
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function codeBlock(c){return '<div class="cb"><span class="lt">Java</span><pre>'+esc(c)+'</pre></div>'}

function ansBtn(id){return '<button class="btn-ans" onclick="ta(\''+id+'\')">&#9656; 显示答案</button>'}

function ansContent(html){return '<div class="ans" id="ac-'+html.id+'"><div class="al">&#10004; '+(html.isRef?'参考答案':'正确答案')+'</div>'+html.body+'</div>'}

function render(){
  var nav=document.getElementById('nav');
  var ctx=document.getElementById('ctx');
  var tq=0;

  CHS.forEach(function(ch,i){
    // nav
    var b=document.createElement('button');
    b.className='nav-btn'+(i===0?' on':'');
    b.innerHTML='<span class="num">'+ch.id+'</span>'+esc(ch.title);
    b.onclick=function(){showCh(i)};
    nav.appendChild(b);

    // content
    var w=document.createElement('section');
    w.className='ch-wrap'+(i===0?' on':'');
    w.id='cw-'+i;
    var html='<div class="ch-hdr"><h3>第'+ch.id+'章：'+esc(ch.title)+'</h3><div class="sub">'+esc(ch.sub)+'</div></div>';

    ch.secs.forEach(function(sec){
      html+='<div class="sec"><div class="sec-title">'+esc(sec.l)+'</div>';
      sec.qs.forEach(function(q,qi){
        var uid='c'+i+'-'+sec.t+'-'+qi;
        html+='<div class="card" id="'+uid+'">';

        if(sec.t==='choice'||sec.t==='error'){
          html+='<div class="qt">'+esc(q.q)+'</div><div class="opts">';
          q.o.forEach(function(opt,oi){
            var mkCls=(sec.t==='error'?'mk sq':'mk');
            var letter=String.fromCharCode(65+oi);
            html+='<div class="opt" onclick="sel(this,'+i+',\''+sec.t+'\','+qi+','+oi+')"><span class="'+mkCls+'">'+letter+'</span><span>'+esc(opt)+'</span></div>';
          });
          html+='</div>';
          // answer for choice
          var ansText=q.a;
          if(typeof q.a==='number') ansText=q.o[q.a];
          html+=ansBtn(uid);
          var body=esc(ansText)+(q.e?'<br><br><em>解析：</em>'+esc(q.e):'');
          html+=ansContent({id:uid,body:body});

        }else if(sec.t==='judge'){
          html+='<div class="qt">'+esc(q.q)+'</div><div class="opts">';
          ['√ (正确)','× (错误)'].forEach(function(opt,oi){
            html+='<div class="opt" onclick="sel(this,'+i+',\'judge\','+qi+','+oi+')"><span class="mk sq">'+(oi===0?'√':'×')+'</span><span>'+opt+'</span></div>';
          });
          html+='</div>';
          html+=ansBtn(uid);
          html+=ansContent({id:uid,body:esc(q.a)+(q.e?'<br><br><em>解析：</em>'+esc(q.e):'')});

        }else if(sec.t==='reading'){
          var its=q.its||[{l:'',a:q.a}];
          html+='<div class="qt">'+esc(q.q)+'</div>';
          html+=ansBtn(uid);
          var body='';
          its.forEach(function(it){
            body+='<div class="it"><strong>'+esc(it.l)+'</strong> '+esc(it.a)+'</div>';
          });
          if(q.e) body+='<br><br><em>解析：</em>'+esc(q.e);
          html+=ansContent({id:uid,body:body,isRef:true});

        }else if(sec.t==='code'){
          html+='<div class="qt">'+esc(q.q)+'</div>';
          html+=ansBtn(uid);
          var cb=codeBlock(q.c);
          if(q.e) cb+='<br><br><em>解析：</em>'+esc(q.e);
          html+=ansContent({id:uid,body:cb,isRef:true});
        }

        html+='</div>';
        tq++;
      });
      html+='</div>';
    });

    w.innerHTML=html;
    ctx.appendChild(w);
  });

  document.getElementById('totq').textContent=tq;
}

// ======== INTERACT ========
var curCh=0;
function showCh(i){
  curCh=i;
  document.querySelectorAll('.ch-wrap').forEach(function(e){e.classList.remove('on')});
  document.getElementById('cw-'+i).classList.add('on');
  document.querySelectorAll('.nav-btn').forEach(function(e,idx){e.classList.toggle('on',idx===i)});
  document.getElementById('ctx').scrollIntoView({behavior:'smooth'});
  closeSidebar();
}

var sbOpen=false;
var scrollY=0;
function toggleSidebar(){
  var sb=document.getElementById('sb');
  var ov=document.getElementById('overlay');
  var hm=document.getElementById('hamb');
  sbOpen=!sb.classList.contains('op');
  sb.classList.toggle('op',sbOpen);
  ov.classList.toggle('sh',sbOpen);
  hm.classList.toggle('hd',sbOpen);
  if(sbOpen){
    scrollY=window.scrollY;
    document.body.style.position='fixed';
    document.body.style.top='-'+scrollY+'px';
    document.body.style.width='100%';
  }else{
    unlockScroll();
  }
}
function closeSidebar(){
  if(!document.getElementById('sb').classList.contains('op'))return;
  sbOpen=false;
  document.getElementById('sb').classList.remove('op');
  document.getElementById('overlay').classList.remove('sh');
  document.getElementById('hamb').classList.remove('hd');
  unlockScroll();
}
function unlockScroll(){
  document.body.style.position='';
  document.body.style.top='';
  document.body.style.width='';
  if(scrollY) window.scrollTo(0,scrollY);
}

function ta(uid){
  var card=document.getElementById(uid);
  if(!card)return;
  var ans=card.querySelector('.ans');
  var btn=card.querySelector('.btn-ans');
  if(!ans||!btn)return;
  var sh=!ans.classList.contains('sh');
  ans.classList.toggle('sh',sh);
  btn.innerHTML=sh?'\u25BC 隐藏答案':'\u25B6 显示答案';
}

function sel(el,ci,type,qi,oi){
  var par=el.parentElement;
  if(!QUIZ){
    par.querySelectorAll('.opt').forEach(function(o){o.classList.remove('sel')});
    el.classList.add('sel');
    return;
  }
  var ch=CHS[ci];
  var sec=null;
  for(var k=0;k<ch.secs.length;k++){if(ch.secs[k].t===type){sec=ch.secs[k];break}}
  if(!sec)return;
  var q=sec.qs[qi];
  var correct=q.a;

  par.querySelectorAll('.opt').forEach(function(o){
    o.classList.remove('sel','cor','wro');
  });
  el.classList.add('sel');

  // Determine set of correct indices
  var correctIdxs=[];
  if(typeof correct==='number'){
    correctIdxs=[correct];
  }else if(correct==='√'||correct==='×'){
    if(correct==='√') correctIdxs=[0]; else correctIdxs=[1];
  }else{
    var s=String(correct);
    var letters='ABCD';
    for(var p=0;p<s.length;p++){
      var idx=letters.indexOf(s.charAt(p));
      if(idx>=0) correctIdxs.push(idx);
    }
  }

  var isCorrect=correctIdxs.indexOf(oi)>=0;
  var opts=par.querySelectorAll('.opt');

  if(isCorrect){
    el.classList.add('cor');
  }else{
    el.classList.add('wro');
  }
  // Always show correct answer(s)
  correctIdxs.forEach(function(idx){
    if(opts[idx]) opts[idx].classList.add('cor');
  });
}

var qtog=document.getElementById('qtog');
var qstat=document.getElementById('mstat');
qtog.onclick=function(){
  QUIZ=!QUIZ;
  qtog.classList.toggle('on',QUIZ);
  qstat.textContent=QUIZ?'答题模式 · 选择即反馈':'浏览模式';
  if(!QUIZ){
    document.querySelectorAll('.opt').forEach(function(o){
      o.classList.remove('sel','cor','wro');
    });
  }
};

// Init
render();
</script>
